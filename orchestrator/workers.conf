# Pipeline worker configuration. Edit before kickoff, or run:
#   orchestrator/bin/configure-pipeline.sh
#
# This file is sourced by orchestrator/bin/{run-worker,dispatch}.sh.
# Tracked in git so the chosen pipeline shape is reproducible.

# === Logical -> physical worker class remap =================================
# Tickets declare a logical worker_class. Set REMAP_<class>=<actual> to
# redirect that role to a different physical worker. Hyphens in class names
# become underscores in REMAP variable names (bash limitation).
#
# Physical worker classes available:
#   copilot     — GitHub Copilot CLI
#   cursor      — Cursor agent CLI (text/script)
#   cursor-mcp  — Cursor agent CLI with --approve-mcps (holds blender-mcp lock)
#   cursor-ask  — Cursor agent CLI in --mode ask (read-only critique)
#   claude-cli  — Anthropic claude CLI (--print mode, model from CLAUDE_CLI_MODEL)
#   shell       — verbatim bash from ticket's `## Run` block

REMAP_copilot=copilot
REMAP_cursor=cursor
REMAP_cursor_mcp=cursor-mcp
REMAP_cursor_ask=cursor-ask
REMAP_shell=shell
REMAP_claude_cli=claude-cli

# === claude-cli model selection =============================================
# Used whenever the resolved physical worker is claude-cli.
# Values: opus, sonnet, haiku, opus[1m], sonnet[1m], haiku[1m]
# Default sonnet preserves your Opus weekly quota; bump to opus only when
# you genuinely need it.
CLAUDE_CLI_MODEL=sonnet

# === Common kickoff presets (uncomment one block, or roll your own) =========
#
# Preset A — Default: native CLIs do their natural job, no claude-cli.
#   REMAP_copilot=copilot
#   REMAP_cursor=cursor
#   REMAP_cursor_mcp=cursor-mcp
#   REMAP_cursor_ask=cursor-ask
#
# Preset B — Critique via Opus: route read-only critique through claude --print.
#   REMAP_cursor_ask=claude-cli
#   CLAUDE_CLI_MODEL=opus
#
# Preset C — All-Claude run (use sparingly, burns Anthropic quota):
#   REMAP_copilot=claude-cli
#   REMAP_cursor=claude-cli
#   REMAP_cursor_ask=claude-cli
#   CLAUDE_CLI_MODEL=sonnet
#
# Preset D — Cursor everywhere except MCP (e.g., when copilot is rate-limited):
#   REMAP_copilot=cursor
#
# MCP work cannot be remapped to non-MCP workers; cursor-mcp is the only
# physical class that has the --approve-mcps flag wired through.
